front:
  text: 觀普賢菩薩行法經續疏序天台沙門處咸述茲經者昔吾祖智者禪師嘗約龍樹圓宗大蘇玅契按辯宣通已成章疏大抵明一乘之淵蘊通萬行之旨歸無何有唐季年例遭焚毀負笈之流馳將海外遂不可得而見也末後孤山法師繼而有作但文理太簡學者患之故我神照師又成義疏纔至最初境界以逼緣停翰則後義篾聞處咸雖登東掖輪下有年矣而學問無取因痛微言之將墜又惜前功之未圓輒效章安續淨名之解南山繼僧史之作密求冥助斐然續成析為二卷亦勉旃於吾道讀者無以竊名罪我
